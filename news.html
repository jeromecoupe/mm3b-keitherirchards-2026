<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Music Magazine - Stories</title>
    <link rel="stylesheet" href="css/main.css" />
    <script type="module" src="js/main.js"></script>
  </head>
  <body>
    <header class="siteheader">
      <div class="container">
        <div class="siteheader-content">
          <p class="siteheader-logo">
            <a href="/">
              <img src="img/logo.svg" width="132" height="12" alt="MUSICMAG" />
            </a>
          </p>
          <div class="siteheader-nav">
            <nav>
              <ul class="mainnav">
                <li class="mainnav-item">
                  <a class="mainnav-link" href="/">Home</a>
                </li>
                <li class="mainnav-item">
                  <a class="mainnav-link" href="/company.html">Company</a>
                </li>
                <li class="mainnav-item">
                  <a class="mainnav-link" href="#">News</a>
                </li>
                <li class="mainnav-item">
                  <a class="mainnav-link" href="stories.html">Stories</a>
                </li>
              </ul>
            </nav>
          </div>
          <div class="siteheader-mobilenav">
            <button
              type="button"
              commandfor="mobilemenu"
              command="show-modal"
              class="siteheader-hamburger js-navtrigger"
            >
              <span class="visually-hidden">Open menu</span>
              <img src="img/hamburger.svg" alt="" />
            </button>
          </div>
        </div>
      </div>
      <dialog id="mobilemenu" class="mobilemenu">
        <div class="mobilemenu-actions">
          <button
            type="button"
            commandfor="mobilemenu"
            command="close"
            class="mobilemenu-close js-navtrigger"
          >
            <span class="visually-hidden">Close menu</span>
            <img src="img/hamburger_close.svg" alt="" />
          </button>
        </div>
        <div class="mobilemenu-main">
          <nav>
            <ul class="mobilenav">
              <li class="mobilenav-item">
                <a class="mobilenav-link" href="/">Home</a>
              </li>
              <li class="mobilenav-item">
                <a class="mobilenav-link" href="/company.html">Company</a>
              </li>
              <li class="mobilenav-item">
                <a class="mobilenav-link" href="/news.html">News</a>
              </li>
              <li class="mobilenav-item">
                <a class="mobilenav-link" href="stories.html">Stories</a>
              </li>
            </ul>
          </nav>
        </div>
      </dialog>
    </header>

    <main>
      <div class="section">
        <div class="container">
          <p>news go here</p>
        </div>
      </div>

    <footer class="sitefooter">
      <div class="container">
        <div class="sitefooter-main">
          <div class="sitefooter-company">
            <img
              src="img/logo-big.svg"
              class="fluidimg"
              width="187"
              height="18"
              loading="lazy"
              decoding="async"
              alt="Musicmag"
            />

          <div class="sitefooter-nav">
            <nav>
              <ul class="footernav">
                <li class="footernav-item">
                  <a class="footernav-link" href="/">Home</a>
                </li>
                <li class="footernav-item">

                </li>
                <li class="footernav-item">

                <li class="footernav-item">

          <div class="sitefooter-legal">

              <ul class="footernav">
                <li class="footernav-item">
                  <a class="footernav-link" href="#">Privacy and legal</a>
                </li>
                <li class="footernav-item">

        <div class="sitefooter-end">
          <p class="sitefooter-copyright">
            &copy; La Casa Productions / Webstoemp, 2026
          </p>
        </div>
